name: Deploy Frontend # 前端

on:
  push:
    branches: [ main ] # 当代码推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Linux 服务器
    steps:
      - uses: actions/checkout@v3 # 1. 把你的代码拉取到 GitHub 服务器上
      # 3. 准备 Node.js 环境并编译前端
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24' # ⚠️ 请改成你前端使用的 Node 版本
          
      - name: Build Frontend
        run: |
          npm install
          npm run build # 假设打包出来的文件夹叫 dist
          
      - name: Upload Frontend to Aliyun
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # 只传前端项目文件中的 dist 目录
          source: "dist/" # 如果dockerfile也需要自动更新，可以添加dockerfile到source中,例如:"dist/,dockerfile"
          target: "/root/deploy/frontend" # 传到服务器的前端专属目录
          
      - name: Restart Frontend Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/deploy
            # 注意：这里指定只重启前端的容器（假设在 docker-compose 中服务名叫 frontend-app）
            docker-compose up -d --build frontend
            docker image prune -f